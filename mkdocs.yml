# archive를 정적 사이트로 빌드하는 설정.
# 콘텐츠(content/)는 순수 마크다운 그대로 두고 여기서 소비만 한다(docs_dir).
# 운영 시 solvemeup.com/archive/ 서브패스로 nginx 마운트(별도 배포 단계).

site_name: SolveMeUp Archive
site_description: SolveMeUp 자료구조·알고리즘 지식 아카이브
site_url: https://solvemeup.com/archive/
copyright: 글 콘텐츠는 CC BY-SA 4.0

repo_url: https://github.com/SolveMeUp/archive
repo_name: SolveMeUp/archive

# 글은 content/ 아래에 있다. content/는 도구 전용 문법 없이 순수하게 유지(이식 안전망).
docs_dir: content

# 내비게이션은 awesome-nav 플러그인이 content/ 폴더 구조에서 자동 생성한다(아래 plugins).
# - 카테고리 한글(영문) 라벨과 표시 순서는 각 폴더의 .nav.yml에 둔다(글과 함께 PR로 관리).
#   글 라벨은 그 글 frontmatter title이 자동 사용된다.
# - 글은 평면 <슬러그>.md 파일이라 자동으로 leaf(글 제목 라벨)로 뜬다. 기여자는 글 .md만
#   알맞은 카테고리에 추가하면 nav에 나타난다(설정 파일 비접촉).
#   표시 순서가 중요할 때만 해당 카테고리 .nav.yml의 nav: 에 글을 나열한다(관리자 영역).

theme:
  name: material
  custom_dir: overrides   # KaTeX 주입 등 테마 레이어 — content/를 오염시키지 않기 위함
  language: ko
  # 폰트는 시스템 스택을 쓴다(font: false). 본앱(Client)이 전용 웹폰트 없이 시스템
  # 폰트를 쓰므로 타이포 소스를 맞추고, Google Fonts(Roboto) 의존도 없앤다.
  font: false
  # 색 = 본앱 Tailwind @theme 토큰에 맞춘다(통일감). 라이트 전용:
  #   본앱이 라이트 전용(다크 미지원)이라 다크 토글을 두지 않는다.
  #   primary: white = 흰 헤더(어두운 텍스트). 나머지 디테일(navy 링크·base 코드배경·
  #   neonlime 헤더 라인)은 stylesheets/extra.css가 CSS 변수로 입힌다.
  palette:
    scheme: default
    primary: white
    accent: indigo   # 실제 링크/hover 색은 extra.css에서 navy로 오버라이드
  features:
    # navigation.indexes는 일부러 안 쓴다 — 켜면 카테고리 폴더의 첫 글이 그 카테고리의
    #   대표(인덱스) 페이지로 흡수돼 사이드바에서 사라진다(실측 확인). 글은 평면
    #   <슬러그>.md라 어차피 섹션 인덱스가 필요 없다.
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  # 강조(**굵게**) 렌더 보강. 기본 마크다운은 닫는 `**` 바로 뒤에 한글 조사가
  # 붙으면(예: `**배낭 문제(Knapsack Problem)**는`) 강조 종료로 인식 못 해 굵어지지
  # 않는다(닫는 토큰이 `)`+한글 사이라 smart 규칙에 걸림). betterem을
  # smart_enable: underscore 로 켜면 `_`는 smart(식별자 my_var 오인 방지) 유지,
  # `*`/`**`는 classic(관대) 처리 → 한글 조사 인접 굵게가 정상 렌더된다.
  - pymdownx.betterem:
      smart_enable: underscore
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  # 수식: generic 모드로 출력 → overrides/main.html의 KaTeX auto-render가 렌더.
  - pymdownx.arithmatex:
      generic: true

plugins:
  # 클라이언트사이드 전문검색(백엔드 0). 한국어는 lunr-languages에 스테머가 없어
  # 기본 토크나이저(어절/공백)로 색인된다 — 영문 알고리즘 용어 위주 검색엔 충분한지
  # 스파이크에서 실측한다.
  - search:
      lang:
        - en
  # nav를 content/ 폴더 구조에서 자동 생성한다. 폴더별 .nav.yml로 카테고리 한글 라벨·
  # 표시 순서를 제어하고, 명시 안 한 글은 자동 노출(기여자가 글만 추가하면 nav 반영).
  - awesome-nav

# 브랜드 테마(본앱 토큰 매핑). 경로는 docs_dir(content/) 기준.
# content/stylesheets/는 글이 아니라 '사이트 에셋' 예약 폴더라
# 구조 검증(validate_structure.py)에서 면제된다.
extra_css:
  - stylesheets/extra.css
