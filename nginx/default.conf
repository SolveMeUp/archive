server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # 아카이브는 /archive/ 서브패스 밑에서만 서빙된다(mkdocs site_url=/archive/).
  # 입구 프록시(smu-proxy)가 prefix를 보존한 채 /archive/ 를 이 컨테이너로 넘긴다.
  # mkdocs는 디렉토리 URL(.../slug/)을 쓰므로 $uri/ 로 각 디렉토리의 index.html을 찾는다.
  location /archive/ {
    try_files $uri $uri/ =404;
  }

  # 정적 자산은 캐시(해시 파일명이 아니라 보수적으로 짧게).
  location /archive/assets/ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  # MkDocs가 생성한 404 페이지(절대경로 자산이라 서브패스에서도 정상).
  error_page 404 /archive/404.html;
}
