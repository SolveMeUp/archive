name: Archive CD

# Step 1(현재): main 머지 시 이미지를 빌드해 ghcr에 push 한다.
#   - 서버 자동 배포(SSH)는 아직 없음 — compose에 archive 서비스가 올라간 뒤(Step 2)
#     Step 3에서 배포 스텝을 추가한다. (상세 설계: memory/deploy_pipeline)
#   - 시크릿 불필요: ghcr push는 자동 제공되는 GITHUB_TOKEN으로 충분(packages: write).
on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write # GHCR push용

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (GITHUB_TOKEN)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image (archive)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/solvemeup/archive:dev
