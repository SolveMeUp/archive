name: validate

# 모든 PR과 main push에서 구조·링크를 검증한다.
# paths 필터는 일부러 두지 않는다 — 룰셋이 이 두 체크를 "필수"로 요구하므로,
# 특정 경로를 안 건드리는 PR에서 job이 생성되지 않으면 체크가 영영 pending 되어
# 머지가 막힌다(데드락). job이 가벼우니 매 PR마다 무조건 돌린다.
on:
  pull_request:
  push:
    branches: [main]

# 검증 job은 읽기만 한다. 토큰 권한을 최소로 고정.
permissions:
  contents: read

jobs:
  structure:
    name: 구조 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 글 폴더 구조 검증
        run: python3 .github/scripts/validate_structure.py

  links:
    name: 링크 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 깨진 링크 검사 (내부 링크/파일 경로)
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline: 외부 URL은 건너뛰고 상대 경로/파일 링크만 검사.
          # 외부 링크는 시간이 지나면 자연히 죽으므로 머지 차단 대상에서 제외한다.
          args: --offline --no-progress content README.md CONTRIBUTING.md
          fail: true

  build:
    name: 빌드 검증
    runs-on: ubuntu-latest
    # 정적 사이트가 실제로 빌드되는지 확인한다(구조·링크 검증만으로는 못 잡는
    # nav 경로 오류·설정 오타·끊긴 내부 링크 등을 --strict가 잡는다).
    # NOTE: 머지를 막으려면 룰셋의 required status check에 이 job을 추가해야 한다.
    #       지금은 정보용(초록/빨강 표시만)이다.
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: 의존성 설치
        run: pip install -r requirements.txt
      - name: 정적 사이트 빌드 (깨지면 실패)
        run: mkdocs build --strict
